<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan - City Health Pharmacy</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .landing-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0066cc, #00b4d8);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .landing-content {
            max-width: 500px;
        }

        .landing-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        .landing-page h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .landing-page p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .landing-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-landing {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-login {
            background-color: white;
            color: #0066cc;
        }

        .btn-login:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 50px;
            text-align: center;
        }

        .feature-item {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        .feature-item h3 {
            margin: 10px 0 5px;
            font-size: 14px;
        }

        .feature-item p {
            font-size: 12px;
            opacity: 0.8;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="landing-page">
        <div class="landing-content">
            <div class="landing-logo">💊</div>
            
            <h1>MediScan</h1>
            <p>City Health Pharmacy Management System with Prescription Scanner</p>

            <div class="landing-buttons">
                <a href="login.html" class="btn-landing btn-login">Login to System</a>
                <a href="patient-records.html" class="btn-landing btn-secondary">View Patient Records</a>
            </div>

            <div class="features">
                <div class="feature-item">
                    <h3>📸</h3>
                    <h3>Scan Prescriptions</h3>
                    <p>Real-time camera scanning</p>
                </div>
                <div class="feature-item">
                    <h3>👥</h3>
                    <h3>Patient Records</h3>
                    <p>Complete history management</p>
                </div>
                <div class="feature-item">
                    <h3>📊</h3>
                    <h3>Analytics</h3>
                    <p>Outbreak tracking & reporting</p>
                </div>
                <div class="feature-item">
                    <h3>📦</h3>
                    <h3>Inventory</h3>
                    <p>Stock management system</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
