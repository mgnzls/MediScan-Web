<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan - Prescription Scanner</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="app-header">
            <h1>MediScan</h1>
            <span class="subtitle">Prescription Scanner</span>
        </header>

        <!-- Scanner Section -->
        <main class="scanner-section">
            <div class="camera-container">
                <video id="cameraFeed" class="camera-feed" autoplay playsinline></video>
                <canvas id="captureCanvas" class="hidden"></canvas>
                
                <div class="scanner-guide">
                    <div class="guide-frame"></div>
                </div>

                <button id="captureBtn" class="capture-button">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="8"/>
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </button>
            </div>

            <!-- Preview Section (Hidden by default) -->
            <div id="previewSection" class="preview-section hidden">
                <img id="previewImage" src="" alt="Captured prescription" class="preview-image"/>
                
                <div class="preview-actions">
                    <button id="retakeBtn" class="btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 4v6h6M23 20v-6h-6"/>
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"/>
                        </svg>
                        Retake
                    </button>
                    <button id="saveBtn" class="btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save
                    </button>
                </div>
            </div>
        </main>

        <!-- Gallery Section -->
        <div class="gallery-section">
            <h2>Saved Prescriptions</h2>
            <div id="galleryContainer" class="gallery-grid">
                <p class="empty-message">No prescriptions scanned yet</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
